<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="js/storage.js"></script>
    <script src="js/ai.js"></script>
</head>

<body>

<h1>Finance AI Assistant</h1>

<nav>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="add-transaction.html">Add Transaction</a>
    <a href="history.html">History</a>
    <a href="reports.html">Reports</a>
    <a href="assistant.html">AI Assistant</a>
    <a href="settings.html">Settings</a>
</nav>

<input
type="text"
id="question"
placeholder="Ask any finance question">

<button id="askBtn">Ask AI</button>

<div id="answer"></div>

<script>

document.getElementById("askBtn").onclick = async function(){

    const question =
    document.getElementById("question").value;

    if(question==""){

        answer.textContent="Please enter a question.";

        return;
    }

    try{

        const reply =
        await askAI(question);

        answer.innerHTML=`<p>${reply}</p>`;

    }

    catch{

        answer.textContent="Unable to get AI response.";

    }

}

</script>

</body>

</html>
